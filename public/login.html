<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEXATİ — Giriş / Kayıt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --c-bg:#060a10;--c-accent:#00d4ff;--c-danger:#ff4757;
      --c-success:#2ed573;--c-text:#c8d8e8;--c-dim:#4a6070;
      --c-panel:rgba(8,14,24,0.92);--c-border:rgba(0,212,255,0.18);
      --font-hud:'Orbitron',monospace;--font-mono:'JetBrains Mono',monospace;
    }
    html,body{width:100%;min-height:100%;background:var(--c-bg);font-family:var(--font-mono);color:var(--c-text);overflow:hidden}
    canvas{position:fixed;inset:0;z-index:0;opacity:0.15}
    .wrap{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{
      width:min(440px,96vw);padding:40px 36px;
      background:var(--c-panel);border:1px solid var(--c-border);
      border-radius:16px;backdrop-filter:blur(12px);
      display:flex;flex-direction:column;gap:24px;
    }
    .logo{font-family:var(--font-hud);font-size:36px;font-weight:900;text-align:center;letter-spacing:-2px}
    .logo-hex{color:var(--c-accent);text-shadow:0 0 30px var(--c-accent)}
    .logo-domain{color:#fff}
    .tabs{display:flex;gap:4px;background:rgba(0,0,0,0.3);padding:4px;border-radius:8px}
    .tab{flex:1;font-family:var(--font-hud);font-size:11px;letter-spacing:1px;padding:9px;border:none;border-radius:5px;background:transparent;color:var(--c-dim);cursor:pointer;transition:.2s}
    .tab.active{background:rgba(0,212,255,0.12);color:var(--c-accent);box-shadow:0 0 0 1px rgba(0,212,255,0.3)}
    .form{display:flex;flex-direction:column;gap:14px}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-family:var(--font-hud);font-size:9px;letter-spacing:2px;color:var(--c-dim)}
    .field input{
      padding:11px 14px;background:rgba(255,255,255,0.04);
      border:1px solid rgba(0,212,255,0.15);border-radius:6px;
      color:var(--c-text);font-family:var(--font-mono);font-size:14px;
      outline:none;transition:.2s
    }
    .field input:focus{border-color:var(--c-accent);background:rgba(0,212,255,0.04)}
    .btn{
      font-family:var(--font-hud);font-size:13px;font-weight:700;letter-spacing:3px;
      padding:14px;border-radius:8px;border:1px solid var(--c-accent);
      background:rgba(0,212,255,0.1);color:var(--c-accent);cursor:pointer;
      transition:.2s;text-shadow:0 0 8px var(--c-accent)
    }
    .btn:hover{box-shadow:0 0 24px rgba(0,212,255,0.3);transform:translateY(-1px)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
    .msg{padding:10px 14px;border-radius:6px;font-size:12px;text-align:center;display:none}
    .msg.ok{background:rgba(46,213,115,0.12);border:1px solid var(--c-success);color:var(--c-success);display:block}
    .msg.err{background:rgba(255,71,87,0.12);border:1px solid var(--c-danger);color:var(--c-danger);display:block}
    .sep{text-align:center;color:var(--c-dim);font-size:11px;position:relative}
    .sep::before,.sep::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--c-border)}
    .sep::before{left:0}.sep::after{right:0}
    .guest-btn{
      font-family:var(--font-hud);font-size:10px;letter-spacing:2px;
      padding:10px;border-radius:6px;border:1px solid var(--c-dim);
      background:transparent;color:var(--c-dim);cursor:pointer;transition:.2s
    }
    .guest-btn:hover{border-color:var(--c-text);color:var(--c-text)}
    .back{text-align:center;font-family:var(--font-hud);font-size:9px;letter-spacing:1px;color:var(--c-dim)}
    .back a{color:var(--c-dim);text-decoration:none;transition:.2s}
    .back a:hover{color:var(--c-accent)}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="wrap">
  <div class="card">
    <div class="logo"><span class="logo-hex">HEX</span><span class="logo-domain">ATİ</span></div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">GİRİŞ</button>
      <button class="tab" onclick="switchTab('register')">KAYIT</button>
    </div>
    <div id="msg" class="msg"></div>

    <!-- Login -->
    <form id="loginForm" class="form" onsubmit="doLogin(event)">
      <div class="field"><label>KULLANICI ADI</label><input id="l-user" placeholder="kullaniciadiniz" autocomplete="username"></div>
      <div class="field"><label>ŞİFRE</label><input id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn" type="submit" id="loginBtn">→ GİRİŞ YAP</button>
    </form>

    <!-- Register (hidden) -->
    <form id="registerForm" class="form" style="display:none" onsubmit="doRegister(event)">
      <div class="field"><label>KULLANICI ADI</label><input id="r-user" placeholder="3-20 karakter, harf/rakam/_" autocomplete="username"></div>
      <div class="field"><label>E-POSTA (opsiyonel)</label><input id="r-email" type="email" placeholder="email@adres.com"></div>
      <div class="field"><label>ŞİFRE</label><input id="r-pass" type="password" placeholder="en az 6 karakter" autocomplete="new-password"></div>
      <div class="field"><label>ŞİFRE TEKRAR</label><input id="r-pass2" type="password" placeholder="••••••••" autocomplete="new-password"></div>
      <button class="btn" type="submit" id="regBtn">→ HESAP OLUŞTUR</button>
    </form>

    <div class="sep">VEYA</div>
    <button class="guest-btn" onclick="guestPlay()">👤 MİSAFİR OLARAK OYNA</button>
    <div class="back"><a href="index.html">← Ana Menüye Dön</a></div>
  </div>
</div>

<script>
  // Hex arkaplan
  const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
  let W,H,hexes=[];
  function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;hexes=[];
    const S=28,cols=Math.ceil(W/(S*1.73))+2,rows=Math.ceil(H/(S*1.5))+2;
    for(let c=-1;c<cols;c++)for(let r=-1;r<rows;r++)hexes.push({x:c*S*Math.sqrt(3)+(r&1?S*Math.sqrt(3)*.5:0),y:r*S*1.5,ph:Math.random()*6.28,sp:.004+Math.random()*.006});}
  function drawHex(x,y,s){ctx.beginPath();for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6;i===0?ctx.moveTo(x+s*Math.cos(a),y+s*Math.sin(a)):ctx.lineTo(x+s*Math.cos(a),y+s*Math.sin(a))}ctx.closePath()}
  (function loop(){ctx.clearRect(0,0,W,H);for(const h of hexes){h.ph+=h.sp;const a=.03+.07*(0.5+0.5*Math.sin(h.ph));drawHex(h.x,h.y,26);ctx.strokeStyle=`rgba(0,212,255,${a})`;ctx.lineWidth=.7;ctx.stroke()}requestAnimationFrame(loop)})();
  window.addEventListener('resize',resize);resize();

  function switchTab(tab){
    document.getElementById('loginForm').style.display    = tab==='login'?'':'none';
    document.getElementById('registerForm').style.display = tab==='register'?'':'none';
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(tab==='login'?i===0:i===1)));
    document.getElementById('msg').className='msg';
  }

  function showMsg(text,type){const el=document.getElementById('msg');el.textContent=text;el.className='msg '+type}

  async function doLogin(e){
    e.preventDefault();
    const user=document.getElementById('l-user').value.trim();
    const pass=document.getElementById('l-pass').value;
    if(!user||!pass){showMsg('Tüm alanları doldurun','err');return}
    const btn=document.getElementById('loginBtn');btn.disabled=true;btn.textContent='...';
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,password:pass})});
    const d=await r.json();
    btn.disabled=false;btn.textContent='→ GİRİŞ YAP';
    if(d.ok){localStorage.setItem('hexati_token',d.token);localStorage.setItem('hexati_user',JSON.stringify(d.user));showMsg('Giriş başarılı! Yönlendiriliyor...','ok');setTimeout(()=>window.location.href='index.html',1200)}
    else showMsg(d.error||'Hata','err');
  }

  async function doRegister(e){
    e.preventDefault();
    const user=document.getElementById('r-user').value.trim();
    const email=document.getElementById('r-email').value.trim();
    const pass=document.getElementById('r-pass').value;
    const pass2=document.getElementById('r-pass2').value;
    if(!user||!pass){showMsg('Zorunlu alanlar eksik','err');return}
    if(pass!==pass2){showMsg('Şifreler eşleşmiyor','err');return}
    const btn=document.getElementById('regBtn');btn.disabled=true;btn.textContent='...';
    const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,password:pass,email})});
    const d=await r.json();
    btn.disabled=false;btn.textContent='→ HESAP OLUŞTUR';
    if(d.ok){localStorage.setItem('hexati_token',d.token);localStorage.setItem('hexati_user',JSON.stringify(d.user));showMsg('Hesap oluşturuldu!','ok');setTimeout(()=>window.location.href='index.html',1200)}
    else showMsg(d.error||'Hata','err');
  }

  function guestPlay(){window.location.href='index.html'}

  // Zaten giriş yapılmışsa yönlendir
  const savedUser=localStorage.getItem('hexati_user');
  if(savedUser){try{const u=JSON.parse(savedUser);if(u&&u.username)window.location.href='index.html'}catch{}}
</script>
</body>
</html>
